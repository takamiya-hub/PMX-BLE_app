<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>リハビリ支援コントローラー</title>
    <style>
        body { font-family: "Helvetica Neue", Arial, sans-serif; padding: 20px; max-width: 600px; margin: 0 auto; background-color: #f4f7f6; color: #333; }
        h2 { text-align: center; color: #444; margin-bottom: 30px; }
        
        /* カードデザイン */
        .motion-card {
            background: white;
            border-left: 5px solid #007bff; /* 青いライン */
            padding: 20px;
            margin-bottom: 20px;
            border-radius: 8px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.05);
        }
        /* 背屈（動作2）だけ色を変えて区別しやすくする */
        .motion-card.haikutsu {
            border-left-color: #28a745; /* 緑のライン */
        }

        .motion-card h3 { margin-top: 0; font-size: 1.2em; border-bottom: 1px solid #eee; padding-bottom: 10px; margin-bottom: 15px; }
        
        /* 入力エリアのレイアウト */
        .input-row { display: flex; justify-content: space-between; gap: 15px; }
        .input-group { flex: 1; }
        
        label { display: block; font-weight: bold; margin-bottom: 5px; font-size: 0.9em; color: #666; }
        input[type="number"] { 
            width: 100%; padding: 10px; font-size: 16px; 
            border: 1px solid #ddd; border-radius: 4px; box-sizing: border-box; 
        }
        span.unit { font-size: 0.8em; color: #888; float: right; margin-top: -25px; margin-right: 10px; position: relative; z-index: 10; }

        /* パワースライダー */
        .power-group { margin-top: 15px; }
        .power-group label { display: block; font-weight: bold; font-size: 0.9em; color: #666; margin-bottom: 4px; }
        input[type="range"] { width: 100%; margin-top: 4px; accent-color: #007bff; cursor: pointer; }
        .motion-card.haikutsu input[type="range"] { accent-color: #28a745; }
        .power-value { font-size: 1.1em; font-weight: bold; color: #007bff; }
        .motion-card.haikutsu .power-value { color: #28a745; }

        /* 動作アイコン */
        .card-icon { text-align: center; margin: 6px 0 14px; }

        /* ボタン */
        button { 
            width: 100%; padding: 15px; font-size: 18px; font-weight: bold; 
            cursor: pointer; background-color: #007bff; color: white; 
            border: none; border-radius: 50px; transition: background 0.3s;
            box-shadow: 0 4px 6px rgba(0,123,255,0.2);
        }
        button:disabled { background-color: #ccc; cursor: not-allowed; box-shadow: none; }
        button:hover:not(:disabled) { background-color: #0056b3; transform: translateY(-1px); }
        
        button#connectBtn { background-color: #6c757d; margin-bottom: 20px; font-size: 16px; padding: 10px; }
        
        /* ログエリア */
        .log { background: #333; color: #0f0; padding: 10px; height: 100px; overflow-y: scroll; font-family: monospace; border-radius: 5px; margin-top: 30px; font-size: 0.8em; }
        .status-badge { background: #eee; padding: 2px 8px; border-radius: 4px; font-size: 0.8em; margin-left: 10px; }
    </style>
</head>
<body>

    <h2>リハビリ装置コントローラー</h2>

    <div style="text-align: center; margin-bottom: 20px;">
        <button id="connectBtn" onclick="connectToDevice()">Arduinoに接続する</button>
        <div style="margin-top:5px;">ステータス: <span id="status" class="status-badge" style="color:red;">未接続</span></div>
    </div>

    <div class="motion-card">
        <h3>動作 1：掌屈（しょうくつ）</h3>
        <div class="card-icon">
            <!-- 掌屈アイコン：側面ビュー。前腕（先細り）＋手（手のひら・指4本・親指）が掌側へ曲がる -->
            <svg width="160" height="120" viewBox="0 0 160 120" xmlns="http://www.w3.org/2000/svg">
                <!-- 前腕（側面、肘側で太く手首側で細い、解剖学的なくびれ） -->
                <path d="M 5,30 C 25,26 50,30 68,38 C 73,40 76,43 78,45 L 78,55 C 76,57 73,60 68,62 C 50,70 25,74 5,70 Z"
                      fill="#f5e0c8" stroke="#8b6a42" stroke-width="1.5" stroke-linejoin="round"/>
                <!-- 手＋指のグループ（掌屈方向に40°回転） -->
                <g transform="rotate(40, 78, 50)">
                    <!-- 手のひら（手の甲側面） -->
                    <path d="M 78,40 C 90,38 105,38 117,42 C 124,44 126,48 126,50 C 126,52 124,56 117,58 C 105,62 90,62 78,60 Z"
                          fill="#f5e0c8" stroke="#8b6a42" stroke-width="1.5" stroke-linejoin="round"/>
                    <!-- 親指（手の甲側に立ち上がる） -->
                    <path d="M 95,40 C 95,30 105,26 112,30 C 116,34 113,42 107,44 C 100,44 95,42 95,40 Z"
                          fill="#f5e0c8" stroke="#8b6a42" stroke-width="1.2" stroke-linejoin="round"/>
                    <!-- 人差し指 -->
                    <path d="M 124,42 C 134,40 144,42 148,44 C 149,45 149,47 148,48 C 144,49 134,48 124,47 Z"
                          fill="#f5e0c8" stroke="#8b6a42" stroke-width="1.2"/>
                    <!-- 中指（最も長い） -->
                    <path d="M 124,46 C 136,44 148,46 152,48 C 153,49 153,51 152,52 C 148,53 136,52 124,51 Z"
                          fill="#f5e0c8" stroke="#8b6a42" stroke-width="1.2"/>
                    <!-- 薬指 -->
                    <path d="M 124,50 C 134,48 146,50 150,52 C 151,53 151,55 150,56 C 146,57 134,56 124,55 Z"
                          fill="#f5e0c8" stroke="#8b6a42" stroke-width="1.2"/>
                    <!-- 小指（最も短い） -->
                    <path d="M 124,54 C 132,53 140,54 143,56 C 144,57 144,58 143,59 C 140,60 132,59 124,58 Z"
                          fill="#f5e0c8" stroke="#8b6a42" stroke-width="1.2"/>
                </g>
                <!-- 動作方向を示す曲線矢印（掌屈方向：下） -->
                <path d="M 132,30 Q 148,55 138,90" stroke="#007bff" stroke-width="2.5" fill="none" stroke-linecap="round"/>
                <polygon points="132,87 138,100 144,87" fill="#007bff"/>
            </svg>
        </div>
        <div class="input-row">
            <div class="input-group">
                <label>移動時間</label>
                <input type="number" id="time1" value="0" placeholder="0-127">
                <span class="unit">秒</span>
            </div>
            <div class="input-group">
                <label>目標角度</label>
                <input type="number" id="angle1" value="0" placeholder="0-127">
                <span class="unit">度</span>
            </div>
        </div>
        <div class="power-group">
            <label>出力パワー上限：<span id="palmarPowerVal" class="power-value">100</span>%</label>
            <input type="range" id="palmarPower" min="0" max="100" value="100"
                   oninput="document.getElementById('palmarPowerVal').innerText = this.value">
        </div>
    </div>

    <div class="motion-card haikutsu">
        <h3>動作 2：背屈（はいくつ）</h3>
        <div class="card-icon">
            <!-- 背屈アイコン：側面ビュー。前腕（先細り）＋手（手のひら・指4本・親指）が手の甲側へ曲がる -->
            <svg width="160" height="120" viewBox="0 0 160 120" xmlns="http://www.w3.org/2000/svg">
                <!-- 前腕（側面、肘側で太く手首側で細い） -->
                <path d="M 5,50 C 25,46 50,50 68,58 C 73,60 76,63 78,65 L 78,75 C 76,77 73,80 68,82 C 50,90 25,94 5,90 Z"
                      fill="#f5e0c8" stroke="#8b6a42" stroke-width="1.5" stroke-linejoin="round"/>
                <!-- 手＋指のグループ（背屈方向に-40°回転） -->
                <g transform="rotate(-40, 78, 70)">
                    <!-- 手のひら（手の甲側面） -->
                    <path d="M 78,60 C 90,58 105,58 117,62 C 124,64 126,68 126,70 C 126,72 124,76 117,78 C 105,82 90,82 78,80 Z"
                          fill="#f5e0c8" stroke="#8b6a42" stroke-width="1.5" stroke-linejoin="round"/>
                    <!-- 親指（手の甲側に立ち上がる） -->
                    <path d="M 95,60 C 95,50 105,46 112,50 C 116,54 113,62 107,64 C 100,64 95,62 95,60 Z"
                          fill="#f5e0c8" stroke="#8b6a42" stroke-width="1.2" stroke-linejoin="round"/>
                    <!-- 人差し指 -->
                    <path d="M 124,62 C 134,60 144,62 148,64 C 149,65 149,67 148,68 C 144,69 134,68 124,67 Z"
                          fill="#f5e0c8" stroke="#8b6a42" stroke-width="1.2"/>
                    <!-- 中指（最も長い） -->
                    <path d="M 124,66 C 136,64 148,66 152,68 C 153,69 153,71 152,72 C 148,73 136,72 124,71 Z"
                          fill="#f5e0c8" stroke="#8b6a42" stroke-width="1.2"/>
                    <!-- 薬指 -->
                    <path d="M 124,70 C 134,68 146,70 150,72 C 151,73 151,75 150,76 C 146,77 134,76 124,75 Z"
                          fill="#f5e0c8" stroke="#8b6a42" stroke-width="1.2"/>
                    <!-- 小指（最も短い） -->
                    <path d="M 124,74 C 132,73 140,74 143,76 C 144,77 144,78 143,79 C 140,80 132,79 124,78 Z"
                          fill="#f5e0c8" stroke="#8b6a42" stroke-width="1.2"/>
                </g>
                <!-- 動作方向を示す曲線矢印（背屈方向：上） -->
                <path d="M 132,90 Q 148,65 138,30" stroke="#28a745" stroke-width="2.5" fill="none" stroke-linecap="round"/>
                <polygon points="132,33 138,20 144,33" fill="#28a745"/>
            </svg>
        </div>
        <div class="input-row">
            <div class="input-group">
                <label>移動時間</label>
                <input type="number" id="time2" value="0" placeholder="0-127">
                <span class="unit">秒</span>
            </div>
            <div class="input-group">
                <label>目標角度</label>
                <input type="number" id="angle2" value="0" placeholder="0-127">
                <span class="unit">度</span>
            </div>
        </div>
        <div class="power-group">
            <label>出力パワー上限：<span id="dorsalPowerVal" class="power-value">100</span>%</label>
            <input type="range" id="dorsalPower" min="0" max="100" value="100"
                   oninput="document.getElementById('dorsalPowerVal').innerText = this.value">
        </div>
    </div>

    <button id="sendBtn" onclick="sendMotionData()" disabled>設定を送信して開始 ▶</button>

    <div id="logArea" class="log">・通信ログ</div>

    <script>
        // ==========================================================
        // ★ここにあなたのUUIDを入れてください★
        const SERVICE_UUID = "0979fbb4-70ed-4dd5-af21-51a7067f25ea"; 
        const CHAR_UUID    = "02ea9c24-b4b3-42de-88e7-0e418eb8b889";
        // ==========================================================

        let bleDevice = null;
        let bleCharacteristic = null;

        function log(text) {
            const logArea = document.getElementById('logArea');
            logArea.innerHTML += `<div>[${new Date().toLocaleTimeString()}] ${text}</div>`;
            logArea.scrollTop = logArea.scrollHeight;
        }

        // 接続処理
        async function connectToDevice() {
            try {
                log("デバイスを検索中...");

                // 1. デバイスを探す
                bleDevice = await navigator.bluetooth.requestDevice({
                    filters: [{ services: [SERVICE_UUID] }]
                });

                // 「gattserverdisconnected」というイベントが起きたら onDisconnected(切断) を実行せよ
                bleDevice.addEventListener('gattserverdisconnected', onDisconnected);
                
                // 2. サーバーに接続
                const server = await bleDevice.gatt.connect();
                const service = await server.getPrimaryService(SERVICE_UUID);
                bleCharacteristic = await service.getCharacteristic(CHAR_UUID);

                document.getElementById("status").innerText = "接続済み";
                document.getElementById("status").style.color = "green";
                document.getElementById("sendBtn").disabled = false;
                // 接続ボタンを目立たなくする
                document.getElementById("connectBtn").innerText = "✅ 接続完了";
                document.getElementById("connectBtn").style.backgroundColor = "#28a745";
                
                log("接続成功！準備完了。");

            } catch (error) {
                log("エラー: " + error);
            }
        }

        // 送信処理
        async function sendMotionData() {
            if (!bleCharacteristic) return;

            try {
                // 入力値の取得
                let palmarPower = Number(document.getElementById("palmarPower").value);
                let dorsalPower = Number(document.getElementById("dorsalPower").value);
                let t1 = Number(document.getElementById("time1").value);
                let a1 = Number(document.getElementById("angle1").value);
                let t2 = Number(document.getElementById("time2").value);
                let a2 = Number(document.getElementById("angle2").value);

                // 掌屈（動作1）の角度をマイナスに変換（掌屈はサーボの負方向）
                a1 = -Math.abs(a1);

                // 配列作成: [掌屈パワー, 背屈パワー, 掌屈時間, 掌屈角度, 背屈時間, 背屈角度]
                const dataArray = [palmarPower, dorsalPower, t1, a1, t2, a2];

                log(`送信: 掌屈パワー=${palmarPower}%, 背屈パワー=${dorsalPower}% ／ 掌屈[${t1}秒, ${a1}°] 背屈[${t2}秒, ${a2}°]`);

                const dataToSend = new Uint8Array(dataArray);
                await bleCharacteristic.writeValue(dataToSend);

                log("送信完了！");

            } catch (error) {
                log("送信エラー: " + error);
            }
        }
        // 切断された時に実行される関数
        function onDisconnected(event) {
            log("⚠️ デバイスとの接続が切れました", "error");

            // 1. ステータス表示を「未接続」に戻す
            const statusText = document.getElementById("status");
            statusText.innerText = "未接続";
            statusText.style.color = "red";

            // 2. 接続ボタンを元に戻す
            const connectBtn = document.getElementById("connectBtn");
            connectBtn.innerText = "📡 Arduinoに接続する";
            connectBtn.style.backgroundColor = "#6c757d"; // 元のグレーっぽい色
            connectBtn.disabled = false; // 押せるようにする

            // 3. 送信ボタンを押せなくする
            document.getElementById("sendBtn").disabled = true;
            
            // 変数をクリア
            bleDevice = null;
            bleCharacteristic = null;
        }
    </script>
</body>
</html>
